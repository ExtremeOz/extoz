<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link id="favicon" rel="icon" href="/assets/default-favicon.ico" />
  <title>Verify</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="left">
      <img id="logo" alt="Tenant logo" src="/assets/default-logo.svg" height="80" />
      <span class="title" data-i18n="displayName">Example Inspections</span>
    </div>
    <span class="tagline" data-i18n="vtitle">Identity Verfication</span>
  </header>
  <main class="container">
    <p data-i18n="vtagline" class="hint">Securely confirm your contact details to continue.</p>
    <section class="card">
      <p id="verify-intro">When you click verify, we’ll securely confirm your email and/or mobile for this tenant.</p>
      <div id="verify-error" class="error" hidden></div>
      <div class="actions">
        <button class="button-primary" id="verification-cta" data-i18n="vta">Verify now</button>
      </div>
    </section>
  </main>
  <footer class="site-footer">
  <div class="">Need help? Click to email <a id="supportEmail" title="support email" data-policy="mailto" href="mailto:"><span data-i18n="supportEmail"></span></a> or call <a id="supportPhone" title="support phone" data-policy="telto" href="tel:"><span data-i18n="supportPhone"></span></a></div>  </footer>
  <script type="module">window.__BASE__ = '/';</script>
  <script type="module" src="/app.js"></script>
</body>
</html>
